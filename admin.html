<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RocaSalvatella — Panel de consolidación TechSpec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --primary:#009DE0;--primary-dark:#0A6FA0;--accent:#FF8C1A;--ink:#10141A;
      --error:#E5484D;--success:#2FA157;--warning:#F0A020;--disabled:#9AA9B5;
      --bg:#F1F5F9;--subtle:#E8EEF4;--paper:#FFFFFF;
      --text:#0E1B24;--muted:#5B6B78;--border:#E3E9EF;--border-strong:#C9D4DE;
      --radius:10px;--font:'Inter','Segoe UI',Roboto,Arial,sans-serif;--head:'Poppins','Inter',sans-serif;
      --sh-card:0 1px 3px rgba(11,42,61,.08),0 1px 2px rgba(11,42,61,.04);
      --sh-lg:0 12px 32px rgba(11,42,61,.16);
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;}
    h1,h2,h3{font-family:var(--head);margin:0;}
    .appbar{position:sticky;top:0;z-index:100;background:var(--ink);color:#fff;border-bottom:3px solid var(--primary);
      display:flex;align-items:center;gap:16px;padding:0 22px;height:62px;box-shadow:0 2px 10px rgba(0,0,0,.25);}
    .appbar .wm{font-family:var(--head);font-weight:800;font-size:17px;}
    .appbar .wm span{color:var(--primary);}
    .appbar .ttl{font-weight:600;font-size:14px;border-left:1px solid rgba(255,255,255,.2);padding-left:16px;}
    .appbar .ttl small{display:block;font-weight:400;font-size:11px;color:#8894A0;}
    .appbar .sp{flex:1;}
    .appbar .who{font-size:12px;color:#8894A0;}
    .appbar a{color:#fff;font-size:12px;text-decoration:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:7px 12px;}
    .wrap{max-width:1320px;margin:0 auto;padding:22px;}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
    @media(max-width:720px){.kpis{grid-template-columns:1fr 1fr;}}
    .kpi{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--sh-card);}
    .kpi .v{font-family:var(--head);font-size:28px;font-weight:700;line-height:1;}
    .kpi .l{font-size:12px;color:var(--muted);margin-top:6px;}
    .kpi.bl .v{color:var(--error);}
    .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
    .toolbar select,.toolbar button{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--border-strong);border-radius:8px;background:#fff;cursor:pointer;}
    .toolbar .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
    .card{background:var(--paper);border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh-card);overflow:hidden;margin-bottom:22px;}
    .sh{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);}
    .sh h2{font-size:17px;font-weight:700;}
    .sh p{margin:2px 0 0;font-size:12px;color:var(--muted);}

    /* Ficha de contexto del cliente */
    .ctxwrap{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
    @media(max-width:900px){.ctxwrap{grid-template-columns:1fr 1fr;}}
    .ctx{background:var(--paper);padding:10px 14px;}
    .ctx span{display:block;font-size:11px;color:var(--muted);font-weight:600;}
    .ctx b{font-size:13.5px;}

    /* Sección + tabla de 4 columnas */
    .sec{border-top:1px solid var(--border);}
    .sec-h{background:var(--primary-dark);color:#fff;font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;padding:9px 16px;}
    table.q{width:100%;border-collapse:collapse;table-layout:fixed;}
    table.q th{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);background:#F6FAFD;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
    table.q td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top;word-wrap:break-word;}
    table.q tr:last-child td{border-bottom:0;}
    .c-req{width:26%;} .c-v{width:16%;} .c-alt{width:25%;} .c-nt{width:25%;} .c-ed{width:8%;}
    td.req b{font-weight:600;} td.req small{display:block;color:var(--muted);font-size:11px;font-weight:400;margin-top:2px;}
    .muted{color:var(--disabled);}
    .tag{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;}
    .tag.ok{background:rgba(47,161,87,.14);color:var(--success);}
    .tag.ad{background:rgba(240,160,32,.16);color:#946200;}
    .tag.bl{background:rgba(229,72,77,.14);color:var(--error);}
    .tag.pd{background:var(--subtle);color:var(--muted);}
    .nt-cell{font-style:italic;color:#3a4a55;}

    /* Controles de edición */
    .btn-edit,.btn-save,.btn-cancel{font-family:inherit;font-size:12px;font-weight:600;border-radius:7px;padding:6px 10px;cursor:pointer;border:1px solid var(--border-strong);background:#fff;color:var(--text);white-space:nowrap;}
    .btn-edit:hover{border-color:var(--primary);color:var(--primary-dark);}
    .btn-save{background:var(--success);border-color:var(--success);color:#fff;margin-right:5px;}
    .btn-save:hover{background:#268049;}
    .btn-cancel:hover{border-color:var(--error);color:var(--error);}
    .btn-del{font-family:inherit;font-size:12px;font-weight:600;border-radius:8px;padding:7px 12px;cursor:pointer;border:1px solid var(--border-strong);background:#fff;color:var(--muted);white-space:nowrap;}
    .btn-del:hover{border-color:var(--error);color:var(--error);background:rgba(229,72,77,.06);}
    tr.editing{background:#F4FAFE;}
    tr.editing td{vertical-align:top;}
    .ed-v{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:7px;width:100%;background:#fff;}
    .ed-alt,.ed-nt{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--border-strong);border-radius:7px;width:100%;min-height:52px;resize:vertical;}
    .ed-alt:focus,.ed-nt:focus,.ed-v:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,157,224,.18);}

    .empty{padding:50px 20px;text-align:center;color:var(--muted);}
    .empty h2{font-size:18px;margin-bottom:8px;}
    .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
    .legend span{display:inline-flex;gap:6px;align-items:center;}
    .v-dot{display:inline-block;width:11px;height:11px;border-radius:50%;}
    .v-ok{background:var(--success);} .v-ad{background:var(--warning);} .v-bl{background:var(--error);} .v-pd{background:var(--disabled);opacity:.6;}
    .banner{background:#FFF4E5;border:1px solid #F0C486;color:#7a4a00;border-radius:12px;padding:12px 16px;font-size:13px;margin-bottom:18px;}
    .toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;padding:10px 15px;border-radius:9px;font-size:13px;box-shadow:var(--sh-lg);opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:300;}
    .toast.on{opacity:1;transform:none;}
    .toast.err{background:var(--error);}
  </style>
</head>
<body>
  <header class="appbar">
    <span class="wm">Roca<span>Salvatella</span></span>
    <div class="ttl">Panel de consolidación<small>TechSpec · respuestas de clientes</small></div>
    <span class="sp"></span>
    <span class="who" id="who"></span>
    <a href="/.auth/logout" id="logout" style="display:none">Salir</a>
  </header>

  <div class="wrap">
    <div id="banner"></div>

    <div class="kpis">
      <div class="kpi"><div class="v" id="k-resp">–</div><div class="l">Respuestas recibidas</div></div>
      <div class="kpi"><div class="v" id="k-cli">–</div><div class="l">Clientes distintos</div></div>
      <div class="kpi bl"><div class="v" id="k-bl">–</div><div class="l">Bloqueantes marcados</div></div>
      <div class="kpi"><div class="v" id="k-last">–</div><div class="l">Último envío</div></div>
    </div>

    <div class="toolbar">
      <label class="chk">Cliente
        <select id="fCliente"><option value="">Todos</option></select>
      </label>
      <label class="chk"><input type="checkbox" id="onlyBl"> Solo requisitos con bloqueante</label>
      <button onclick="load()">↻ Actualizar</button>
      <button id="btnPurge" onclick="purgeExcept()" title="Eliminar todas las respuestas excepto las de un cliente" style="display:none">🧹 Depurar…</button>
      <span class="sp" style="flex:1"></span>
      <span class="legend">
        <span><i class="v-dot v-ok"></i> Igual</span>
        <span><i class="v-dot v-ad"></i> Adaptar</span>
        <span><i class="v-dot v-bl"></i> Bloqueante</span>
        <span><i class="v-dot v-pd"></i> N/D</span>
      </span>
    </div>

    <div id="content"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="content.js"></script>
  <script>
  const STORE='rs-techspec:';
  const VLABEL={ok:'Igual',ad:'Adaptar',bl:'Bloqueante',pd:'N/D'};
  const VORDER=['ok','ad','bl','pd'];
  let DATA=[]; // respuestas crudas del API
  let IS_ADMIN=false; // solo el rol "admin" puede borrar/depurar

  function schema(){
    const { SECTIONS } = window.TECHSPEC_CONTENT;
    return SECTIONS.map((sec,si)=>({
      title:sec.title, icon:sec.icon,
      rows:sec.rows.map((r,ri)=>({key:`s${si}r${ri}`,label:r[0],def:r[1]}))
    }));
  }
  function metaFields(){ return window.TECHSPEC_CONTENT.META.fields; }
  function stOf(r,k){ return r.state[STORE+'st_'+k]||''; }
  function altOf(r,k){ return r.state[STORE+'alt_'+k]||''; }
  function ntOf(r,k){ return r.state[STORE+'nt_'+k]||''; }
  function metaOf(r,i){ return r.state[STORE+'meta_'+i]||''; }
  function clientName(r){ return metaOf(r,0) || r.client || '—'; }
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function toast(msg,isErr){
    const t=document.getElementById('toast'); t.textContent=msg;
    t.className='toast on'+(isErr?' err':''); clearTimeout(toast._t);
    toast._t=setTimeout(()=>t.className='toast',2200);
  }

  async function whoami(){
    try{
      const r=await fetch('/.auth/me'); const d=await r.json(); const p=d.clientPrincipal;
      if(p){
        document.getElementById('who').textContent=p.userDetails;
        document.getElementById('logout').style.display='inline-block';
        IS_ADMIN=Array.isArray(p.userRoles) && p.userRoles.indexOf('admin')>=0;
      }
    }catch(e){}
    document.getElementById('btnPurge').style.display=IS_ADMIN?'inline-block':'none';
  }

  async function load(){
    const c=document.getElementById('content');
    c.innerHTML='<div class="empty">Cargando…</div>';
    let res;
    try{
      const r=await fetch('api/responses');
      if(r.status===401){ location.href='/.auth/login/aad'; return; }
      res=await r.json();
    }catch(e){
      document.getElementById('banner').innerHTML='<div class="banner">No se ha podido contactar con la API. Esto solo funciona con el despliegue en Azure Static Web Apps.</div>';
      c.innerHTML='<div class="empty"><h2>Sin conexión con el almacén</h2><p>El panel requiere el backend de SWA + Functions.</p></div>';
      setKpis([]); return;
    }
    DATA=(res&&res.responses)||[];
    fillClientes(); render();
  }

  function setKpis(list){
    const secs=schema();
    let bl=0; list.forEach(r=>secs.forEach(s=>s.rows.forEach(row=>{ if(stOf(r,row.key)==='bl') bl++; })));
    document.getElementById('k-resp').textContent=list.length;
    document.getElementById('k-cli').textContent=new Set(list.map(clientName)).size;
    document.getElementById('k-bl').textContent=bl;
    const last=list.map(r=>r.submittedAt).sort().slice(-1)[0];
    document.getElementById('k-last').textContent=last?new Date(last).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'–';
  }

  function fillClientes(){
    const sel=document.getElementById('fCliente'); const cur=sel.value;
    const names=[...new Set(DATA.map(clientName))].sort();
    sel.innerHTML='<option value="">Todos</option>'+names.map(n=>`<option${n===cur?' selected':''}>${esc(n)}</option>`).join('');
  }

  function fmtDate(s){ return s?new Date(s).toLocaleString('es-ES'):''; }

  // ── Render por cliente: cada sección como tabla de 4 columnas ───────────────
  function rowHtml(resp,row){
    const v=stOf(resp,row.key), alt=altOf(resp,row.key), nt=ntOf(resp,row.key);
    return `<tr data-key="${row.key}">
      <td class="req"><b>${esc(row.label)}</b><small>Default RS: ${esc(row.def)}</small></td>
      <td class="v-cell">${v?`<span class="tag ${v}">${VLABEL[v]}</span>`:'<span class="muted">Sin responder</span>'}</td>
      <td class="alt-cell">${alt?esc(alt):'<span class="muted">—</span>'}</td>
      <td class="nt-cell">${nt?esc(nt):'<span class="muted">—</span>'}</td>
      <td class="ed-cell">${IS_ADMIN?'<button type="button" class="btn-edit">✎ Editar</button>':''}</td>
    </tr>`;
  }

  function clientBlock(resp,secs,meta,onlyBl){
    const ctx=meta.map((lb,i)=>{ const val=metaOf(resp,i); return val?`<div class="ctx"><span>${esc(lb)}</span><b>${esc(val)}</b></div>`:''; }).join('');
    let sections=secs.map(sec=>{
      const rows=sec.rows.filter(row=> !onlyBl || stOf(resp,row.key)==='bl');
      if(!rows.length) return '';
      return `<div class="sec"><div class="sec-h">${sec.icon} ${esc(sec.title)}</div>
        <table class="q"><colgroup><col class="c-req"><col class="c-v"><col class="c-alt"><col class="c-nt"><col class="c-ed"></colgroup>
        <thead><tr><th>Requisito</th><th>¿Lo usan?</th><th>Alternativa / preferencia</th><th>Notas</th><th></th></tr></thead>
        <tbody>${rows.map(row=>rowHtml(resp,row)).join('')}</tbody></table></div>`;
    }).join('');
    const edited=resp.editedAt?` · editado ${fmtDate(resp.editedAt)}${resp.editedBy?' por '+esc(resp.editedBy):''}`:'';
    return `<div class="card client-block" data-id="${esc(resp.id)}" data-client="${esc(resp.client)}">
      <div class="sh"><div><h2>${esc(clientName(resp))}</h2><p>Enviado ${fmtDate(resp.submittedAt)}${edited}</p></div><span class="sp" style="flex:1"></span>${IS_ADMIN?'<button type="button" class="btn-del">🗑 Eliminar respuesta</button>':''}</div>
      <div class="ctxwrap">${ctx||'<div class="ctx"><span class="muted">Sin datos de contexto</span></div>'}</div>
      ${sections}
    </div>`;
  }

  function render(){
    setKpis(DATA);
    const fc=document.getElementById('fCliente').value;
    const onlyBl=document.getElementById('onlyBl').checked;
    const list=fc?DATA.filter(r=>clientName(r)===fc):DATA;
    const c=document.getElementById('content');
    if(!list.length){
      c.innerHTML='<div class="empty"><h2>Todavía no hay respuestas</h2><p>Cuando un cliente pulse «Enviar a RS» en el cuestionario, aparecerá aquí. También puedes importar un DOCX/HTML desde el cuestionario y enviarlo.</p></div>';
      return;
    }
    const secs=schema(), meta=metaFields();
    c.innerHTML=list.map(r=>clientBlock(r,secs,meta,onlyBl)).join('');
  }

  function findResp(id){ return DATA.find(r=>String(r.id)===String(id)); }
  function findRow(key){ for(const s of schema()){ const r=s.rows.find(x=>x.key===key); if(r) return r; } return {key,label:key,def:''}; }

  function enterEdit(tr){
    const resp=findResp(tr.closest('.client-block').dataset.id); if(!resp) return;
    const key=tr.dataset.key;
    const v=stOf(resp,key), alt=altOf(resp,key), nt=ntOf(resp,key);
    tr.classList.add('editing');
    tr.querySelector('.v-cell').innerHTML=
      `<select class="ed-v"><option value=""${!v?' selected':''}>— Sin responder</option>`+
      VORDER.map(o=>`<option value="${o}"${o===v?' selected':''}>${VLABEL[o]}</option>`).join('')+`</select>`;
    tr.querySelector('.alt-cell').innerHTML=`<textarea class="ed-alt" placeholder="Alternativa / preferencia…">${esc(alt)}</textarea>`;
    tr.querySelector('.nt-cell').innerHTML=`<textarea class="ed-nt" placeholder="Notas, decisión, responsable…">${esc(nt)}</textarea>`;
    tr.querySelector('.ed-cell').innerHTML=`<button type="button" class="btn-save">💾 Guardar</button><button type="button" class="btn-cancel">Cancelar</button>`;
    const ta=tr.querySelector('.ed-alt'); if(ta) ta.focus();
  }

  function exitEdit(tr){
    const resp=findResp(tr.closest('.client-block').dataset.id);
    const row=findRow(tr.dataset.key);
    tr.classList.remove('editing');
    tr.innerHTML=rowHtml(resp,row).replace(/^<tr[^>]*>/,'').replace(/<\/tr>\s*$/,'');
  }

  async function saveRow(tr){
    const block=tr.closest('.client-block');
    const resp=findResp(block.dataset.id); if(!resp) return;
    const key=tr.dataset.key;
    const v=tr.querySelector('.ed-v').value;
    const alt=tr.querySelector('.ed-alt').value.trim();
    const nt=tr.querySelector('.ed-nt').value.trim();
    const state=Object.assign({}, resp.state);
    if(v) state[STORE+'st_'+key]=v; else delete state[STORE+'st_'+key];
    if(alt) state[STORE+'alt_'+key]=alt; else delete state[STORE+'alt_'+key];
    if(nt) state[STORE+'nt_'+key]=nt; else delete state[STORE+'nt_'+key];
    const btn=tr.querySelector('.btn-save'); btn.disabled=true; btn.textContent='Guardando…';
    try{
      const r=await fetch('api/update',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({client:resp.client,id:resp.id,state})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok || !d.ok) throw new Error(d.error||('El servidor respondió '+r.status));
      resp.state=state; resp.editedAt=d.editedAt||resp.editedAt; if(d.editedBy) resp.editedBy=d.editedBy;
      const row=findRow(key);
      tr.classList.remove('editing');
      tr.innerHTML=rowHtml(resp,row).replace(/^<tr[^>]*>/,'').replace(/<\/tr>\s*$/,'');
      // refrescar el subtítulo de "editado" del bloque
      const p=block.querySelector('.sh p');
      if(p) p.textContent=`Enviado ${fmtDate(resp.submittedAt)}`+(resp.editedAt?` · editado ${fmtDate(resp.editedAt)}${resp.editedBy?' por '+resp.editedBy:''}`:'');
      setKpis(DATA);
      toast('Cambios guardados en Azure');
    }catch(e){
      btn.disabled=false; btn.textContent='💾 Guardar';
      toast('No se pudo guardar: '+(e.message||e), true);
    }
  }

  async function deleteResp(btn){
    const block=btn.closest('.client-block');
    const resp=findResp(block.dataset.id); if(!resp) return;
    if(!confirm(`¿Eliminar definitivamente la respuesta de «${clientName(resp)}» (${fmtDate(resp.submittedAt)})?\n\nEsta acción no se puede deshacer.`)) return;
    btn.disabled=true; btn.textContent='Eliminando…';
    try{
      const r=await fetch('api/delete',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({client:resp.client,id:resp.id})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok || !d.ok) throw new Error(d.error||('El servidor respondió '+r.status));
      DATA=DATA.filter(x=>String(x.id)!==String(resp.id));
      fillClientes(); render();
      toast('Respuesta eliminada');
    }catch(e){
      btn.disabled=false; btn.textContent='🗑 Eliminar respuesta';
      toast('No se pudo eliminar: '+(e.message||e), true);
    }
  }

  document.getElementById('content').addEventListener('click',e=>{
    const editBtn=e.target.closest('.btn-edit');
    const saveBtn=e.target.closest('.btn-save');
    const cancelBtn=e.target.closest('.btn-cancel');
    const delBtn=e.target.closest('.btn-del');
    if(editBtn){ enterEdit(editBtn.closest('tr')); }
    else if(cancelBtn){ exitEdit(cancelBtn.closest('tr')); }
    else if(saveBtn){ saveRow(saveBtn.closest('tr')); }
    else if(delBtn){ deleteResp(delBtn); }
  });
  async function purgeExcept(){
    const keep=(prompt('Conservar SOLO las respuestas de este cliente (se borrará TODO lo demás):','LANDER')||'').trim();
    if(!keep) return;
    const others=[...new Set(DATA.map(clientName))].filter(n=>n!==keep);
    if(!others.length){ toast('No hay otros clientes que borrar'); return; }
    if(!confirm(`Se eliminarán TODAS las respuestas cuyo cliente NO sea «${keep}».\n\nSe borrarán: ${others.join(', ')}.\n\nEsta acción no se puede deshacer. ¿Continuar?`)) return;
    try{
      const r=await fetch('api/purge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keep:[keep]})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok || !d.ok) throw new Error(d.error||('El servidor respondió '+r.status));
      toast(`Eliminadas ${d.deleted} · conservadas ${d.kept}`);
      load();
    }catch(e){ toast('No se pudo depurar: '+(e.message||e), true); }
  }

  document.getElementById('fCliente').addEventListener('change',render);
  document.getElementById('onlyBl').addEventListener('change',render);
  (async()=>{ await whoami(); load(); })();
  </script>
</body>
</html>
